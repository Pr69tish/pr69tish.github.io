<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=https://preetishkad.netlify.app/">
    <script>
      // preserve path + query + hash
      const newUrl = "https://preetishkad.netlify.app" +
                     window.location.pathname +
                     window.location.search +
                     window.location.hash;
      window.location.replace(newUrl);
    </script>
    <title>Redirecting...</title>
  </head>
  <body>
    <p>Redirecting to new site...</p>
  </body>
</html>
